<!DOCTYPE html>
<html>
<head>
    <title>Playlist Shuffler</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="Video-container"></div>

    <div id="Right-UI">

        <div id="Above"> 

	    <button id="Prev-button">
		<span> Prev </span>
            </button>

	    <button id="Next-button">
		<span> Next </span>
            </button>

	    <button id="Resume-button">
		<span> Resume last session </span>
            </button>

            <div id="Playlist-input-UI">
                <span> Playlist ID </span>

	        <input id="Playlist-input" type="text" placeholder="Enter playlist ID"></input>

		<button id="Shuffle-button">
		    <span> Shuffle </span>
            	</button>
            </div>
	    
	    <div id="Details">
	        <span id="Playlist-name-text">  </span>
	        <span id="Video-counter-text">  </span>
	    </div>

        </div>

	<input id="Search-input" type="text" placeholder="Search video title"></input>
        <div id="Playlist">
            <ul id="List">
            </ul>
        </div>

    </div>

    <script src="config.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
</body
</html>
